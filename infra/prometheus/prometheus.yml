global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'nvidia-gpu'
    static_configs:
      - targets: ['nvidia-exporter:9835']

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:9091']

  - job_name: 'url-service'
    static_configs:
      - targets: ['url-service:9192']

  - job_name: 'monitor-worker'
    static_configs:
      - targets: ['monitor-worker:9194']

  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics-service:9193']
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:9195']