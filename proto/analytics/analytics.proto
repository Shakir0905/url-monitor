syntax = "proto3";

package analytics;

option go_package = "github.com/shakir/url-monitor/proto/analytics;analyticspb";

import "google/protobuf/timestamp.proto";

service AnalyticsService {
  rpc GetURLStats(GetURLStatsRequest) returns (URLStats);
  rpc GetUserDashboard(GetUserDashboardRequest) returns (UserDashboard);
}

message GetURLStatsRequest {
  int64 url_id = 1;
  google.protobuf.Timestamp from = 2;
  google.protobuf.Timestamp to = 3;
}

message URLStats {
  int64 url_id = 1;
  int64 total_checks = 2;
  int64 successful_checks = 3;
  int64 failed_checks = 4;
  double uptime_percentage = 5;
  double avg_response_time_ms = 6;
  int32 last_status_code = 7;
  bool is_currently_up = 8;
}

message GetUserDashboardRequest {
  int64 user_id = 1;
}

message UserDashboard {
  int64 user_id = 1;
  int32 total_urls = 2;
  int32 active_urls = 3;
  int32 urls_currently_up = 4;
  int32 urls_currently_down = 5;
  repeated URLStats top_urls = 6;
}

