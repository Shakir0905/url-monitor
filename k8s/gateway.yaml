apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: url-monitor/gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9195
          name: metrics
        env:
        - name: HTTP_PORT
          value: "8000"
        - name: METRICS_PORT
          value: "9195"
        - name: AUTH_SERVICE_ADDR
          value: auth-service:50051
        - name: URL_SERVICE_ADDR
          value: url-service:50052
        - name: ANALYTICS_SERVICE_ADDR
          value: analytics-service:50053
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  - name: metrics
    port: 9195
    targetPort: 9195
